name: Mobile · Build Release APK

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
  pull_request:
    paths:
      - 'mobile/**'
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    working-directory: mobile

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Decode release keystore
        id: keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/cream-release.keystore
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=cream-release.keystore
          EOF
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build release APK (per-ABI, smaller than a fat debug build)
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_BASE_URL=https://cream.thirdsan.com/api

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cream-pos-release-apk${{ steps.keystore.outputs.signed == 'true' && '' || '-unsigned' }}
          path: mobile/build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 14
