name: Mobile (Android)

on:
  push:
    branches: ["**"]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-android.yml"
  pull_request:
    paths:
      - "mobile/**"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL to bake into the build"
        default: "https://cream.thirdsan.com/api"
        required: false

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit/widget tests
        run: flutter test

      - name: Build release APK
        env:
          API_BASE_URL: ${{ inputs.api_base_url || 'https://cream.thirdsan.com/api' }}
        run: flutter build apk --release --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cream-pos-android-${{ github.run_number }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
