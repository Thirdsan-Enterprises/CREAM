services:
  app:
    image: ${IMAGE:-ghcr.io/thirdsan-enterprises/cream-backend:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:9080:8080"
    env_file:
      - .env
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cream}
      MYSQL_USER: ${DB_USERNAME:-cream}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"

volumes:
  storage:
  db_data:
