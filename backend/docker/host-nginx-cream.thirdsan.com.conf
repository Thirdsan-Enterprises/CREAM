# Host-level Nginx vhost for cream.thirdsan.com.
#
# This file is NOT used inside Docker — it belongs on the Contabo VPS itself,
# at /etc/nginx/sites-available/cream.thirdsan.com, symlinked into
# sites-enabled. The VPS's shared host Nginx terminates TLS and reverse-proxies
# to the Dockerized app's Nginx container, which is bound to 127.0.0.1:8081
# (see docker-compose.yml). This mirrors how other Thirdsan apps share the
# same VPS/Nginx behind their own subdomains.
#
# One-time setup on the VPS:
#   1. DNS: create an A record for cream.thirdsan.com -> the VPS's public IP.
#   2. Copy this file to /etc/nginx/sites-available/cream.thirdsan.com and
#      symlink it: ln -s /etc/nginx/sites-available/cream.thirdsan.com \
#                         /etc/nginx/sites-enabled/cream.thirdsan.com
#   3. Issue the certificate: certbot --nginx -d cream.thirdsan.com
#      (certbot rewrites this file in place to add the ssl_certificate lines
#      and the HTTP->HTTPS redirect block — the server block below is the
#      pre-certbot starting point.)
#   4. nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name cream.thirdsan.com;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
